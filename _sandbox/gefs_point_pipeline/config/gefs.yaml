source_priority: ["aws"]
model: "gefs"
products_try: ["atmos.5", "atmos.5b"]

members:
  - c00
  - p01
  - p02
  - p03
  - p04
  - p05
  - p06
  - p07
  - p08
  - p09
  - p10
  - p11
  - p12
  - p13
  - p14
  - p15
  - p16
  - p17
  - p18
  - p19
  - p20
  - p21
  - p22
  - p23
  - p24
  - p25
  - p26
  - p27
  - p28
  - p29
  - p30

lead_hours:
  start: 0
  end: 240
  step: 3

variables:
  precip:
    canonical_name: "APCP"
    search_strings:
      - "APCP:surface"
      - "APCP"
  soil_moisture:
    canonical_name: "SOILW"
    search_strings:
      - "SOILW"
    levels_preference:
      - "0-0.1 m below ground"
      - "0.1-0.4 m below ground"
      - "0.4-1 m below ground"
      - "1-2 m below ground"

runtime:
  candidate_lookback_hours: 60
  representative_fxx: 0
  completeness_probe_fxx: 3
  max_workers: 8
  retries: 3
  retry_backoff_sec: 1.5
  keep_cycles: 1
  keep_failed_runs: 3
  keep_smoke_runs: 5
  schema_version: 1
  require_member_count: 31
  latest_pointer_name: "latest_init.txt"

output:
  runs_root: "data/_sandbox_gefs/runs"
  smoke_runs_root: "data/_sandbox_gefs/smoke_runs"
  web_out_dir: "data/_sandbox_gefs/web"
  web_filename: "gefs_big_trees_latest.json"

qc:
  nan_tolerance: 0.05
  value_range_checks:
    SOILW: [0.0, 1.0]
    APCP: [0.0, 500.0]
