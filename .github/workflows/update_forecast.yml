name: Update Big Trees forecast

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-big-trees-forecast
  cancel-in-progress: false

jobs:
  update-forecast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Sync to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update forecast JSON
        env:
          BIG_TREES_FORECAST_ALLOW_STALE_ON_ERROR: "1"
        run: |
          chmod +x scripts/update_big_trees_forecast.sh
          scripts/update_big_trees_forecast.sh

      - name: Publish forecast asset to live-data branch
        env:
          LIVE_DATA_COMMIT_MESSAGE: "chore: update Big Trees forecast data"
        run: |
          scripts/publish_live_data_artifacts.sh \
            assets/data/forecasts/big_trees_latest.json
