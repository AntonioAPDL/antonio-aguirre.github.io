name: Update Big Trees forecast

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-forecast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update forecast JSON
        env:
          BIG_TREES_FORECAST_ALLOW_STALE_ON_ERROR: "1"
        run: |
          chmod +x scripts/update_big_trees_forecast.sh
          scripts/update_big_trees_forecast.sh

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- assets/data/forecasts/big_trees_latest.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/forecasts/big_trees_latest.json
          git commit -m "chore: update Big Trees forecast"
          git push
