name: Update Big Trees forecast

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-big-trees-forecast
  cancel-in-progress: false

jobs:
  update-forecast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Sync to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update forecast JSON
        env:
          BIG_TREES_FORECAST_ALLOW_STALE_ON_ERROR: "1"
        run: |
          chmod +x scripts/update_big_trees_forecast.sh
          scripts/update_big_trees_forecast.sh

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          if git diff --quiet -- assets/data/forecasts/big_trees_latest.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/forecasts/big_trees_latest.json
          if git diff --cached --quiet; then
            echo "No staged forecast asset changes to commit."
            exit 0
          fi
          git commit -m "chore: update Big Trees forecast"
          if ! git pull --rebase origin main; then
            echo "Concurrent update caused rebase conflict; skipping forecast push."
            git rebase --abort || true
            exit 0
          fi
          if ! git push; then
            echo "Push rejected (likely concurrent update); skipping forecast push."
            exit 0
          fi
