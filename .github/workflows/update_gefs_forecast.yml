name: Update GEFS Big Trees forecast

on:
  schedule:
    # GEFS publishes 00/06/12/18 UTC cycles. Run every 8 hours and publish
    # only the latest completed cycles to the live-data branch.
    - cron: "20 1,9,17 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-gefs-forecast
  cancel-in-progress: false

jobs:
  update-gefs-forecast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Sync to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "_sandbox/gefs_point_pipeline/requirements.txt"

      - name: Install GEFS dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r _sandbox/gefs_point_pipeline/requirements.txt

      - name: Run GEFS update script
        env:
          GEFS_FORECAST_ALLOW_STALE_ON_ERROR: "1"
        run: |
          chmod +x scripts/update_big_trees_gefs_forecast.sh
          scripts/update_big_trees_gefs_forecast.sh

      - name: Publish GEFS asset to live-data branch
        env:
          LIVE_DATA_COMMIT_MESSAGE: "chore: update GEFS Big Trees forecast data"
        run: |
          scripts/publish_live_data_artifacts.sh \
            assets/data/forecasts/gefs_big_trees_latest.json
