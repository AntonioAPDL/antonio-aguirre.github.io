name: Update GEFS Big Trees forecast

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-gefs-forecast
  cancel-in-progress: false

jobs:
  update-gefs-forecast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Sync to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install GEFS dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r _sandbox/gefs_point_pipeline/requirements.txt

      - name: Run GEFS update script
        run: |
          chmod +x scripts/update_big_trees_gefs_forecast.sh
          scripts/update_big_trees_gefs_forecast.sh

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          if git diff --quiet -- assets/data/forecasts/gefs_big_trees_latest.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/forecasts/gefs_big_trees_latest.json
          if git diff --cached --quiet; then
            echo "No staged GEFS asset changes to commit."
            exit 0
          fi
          git commit -m "chore: update GEFS Big Trees forecast"
          if ! git pull --rebase origin main; then
            echo "Concurrent update caused rebase conflict; skipping this run."
            git rebase --abort || true
            exit 0
          fi
          if ! git push; then
            echo "Push rejected (likely concurrent update); skipping this run."
            exit 0
          fi
