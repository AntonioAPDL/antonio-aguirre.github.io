name: Update Big Trees QDESN fit

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-qdesn-fit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Update QDESN overlay JSON
        env:
          BIG_TREES_QDESN_ALLOW_STALE_ON_ERROR: "1"
          BIG_TREES_QDESN_INSTALL_EXDQLM: "1"
          BIG_TREES_QDESN_START_DATE: "1990-01-01"
          BIG_TREES_QDESN_LOCAL_TZ: "America/Los_Angeles"
          BIG_TREES_QDESN_IV_RECENT_DAYS: "90"
          BIG_TREES_QDESN_IV_MIN_COVERAGE: "0.90"
          BIG_TREES_QDESN_WARM_START_N: "2500"
          BIG_TREES_QDESN_WINDOW_DAYS: "20"
          BIG_TREES_QDESN_ND_DRAWS: "1000"
          BIG_TREES_QDESN_CHUNK_SIZE: "250"
          BIG_TREES_QDESN_VB_MAX_ITER: "35"
          BIG_TREES_QDESN_VB_N_SAMP_XI: "50"
          BIG_TREES_QDESN_ONLINE_MAXIT_SIGMAGAM: "250"
          BIG_TREES_QDESN_ONLINE_M: "20"
          BIG_TREES_QDESN_ONLINE_K: "80"
          BIG_TREES_QDESN_ONLINE_W: "60"
          BIG_TREES_QDESN_ONLINE_L_LOC: "1"
          BIG_TREES_QDESN_ONLINE_WINDOW_PASSES: "0"
        run: |
          chmod +x scripts/update_big_trees_qdesn_fit.sh
          scripts/update_big_trees_qdesn_fit.sh

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- assets/data/forecasts/big_trees_qdesn_latest.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/forecasts/big_trees_qdesn_latest.json
          git commit -m "chore: update Big Trees QDESN fit"
          git push
